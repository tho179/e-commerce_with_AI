{% extends "base.html" %}
{% block title %}Đăng nhập | BookShop{% endblock %}

{% block content %}
<div style="max-width:420px; margin:28px auto;">
    <div class="card">
        <div class="card-title">Đăng nhập</div>
        <div class="card-body">
            <form method="post" action="/auth/login/">
                {% csrf_token %}
                <div class="field">
                    <label class="lbl">Tên đăng nhập</label>
                    <input class="input" name="username" required autofocus>
                </div>
                <div class="field">
                    <label class="lbl">Mật khẩu</label>
                    <input class="input" type="password" name="password" required>
                </div>
                <button class="btn btn-primary btn-block" type="submit">Đăng nhập</button>
            </form>
            <div class="muted" style="margin-top:12px; font-size:13px;">
                Chưa có tài khoản? <a href="/auth/register/" style="color:var(--primary);">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
