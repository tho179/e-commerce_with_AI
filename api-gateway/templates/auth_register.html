{% extends "base.html" %}
{% block title %}Đăng ký | BookShop{% endblock %}

{% block content %}
<div style="max-width:520px; margin:28px auto;">
    <div class="card">
        <div class="card-title">Tạo tài khoản khách hàng</div>
        <div class="card-body">
            <form method="post" action="/auth/register/">
                {% csrf_token %}
                <div class="field">
                    <label class="lbl">Họ và tên</label>
                    <input class="input" name="full_name" placeholder="Nguyen Van A">
                </div>
                <div class="form-row">
                    <div class="field">
                        <label class="lbl">Tên đăng nhập</label>
                        <input class="input" name="username" required>
                    </div>
                    <div class="field">
                        <label class="lbl">Email</label>
                        <input class="input" type="email" name="email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label class="lbl">Mật khẩu</label>
                        <input class="input" type="password" name="password" required>
                    </div>
                    <div class="field">
                        <label class="lbl">Xác nhận mật khẩu</label>
                        <input class="input" type="password" name="confirm_password" required>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" type="submit">Đăng ký tài khoản</button>
            </form>
            <div class="muted" style="margin-top:12px; font-size:13px;">
                Đã có tài khoản? <a href="/auth/login/" style="color:var(--primary);">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
