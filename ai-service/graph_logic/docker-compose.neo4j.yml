services:
  neo4j:
    image: neo4j:5.26
    container_name: kb-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
